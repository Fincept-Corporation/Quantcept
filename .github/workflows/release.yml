name: Release

# Publishes Quantcept to npm: the per-platform compiled binaries as their own
# packages (quantcept-<os>-<arch>), then the root launcher package with matching
# optionalDependencies.
#
# Each platform is built ON its native runner — @opentui/core loads a native
# rendering lib via `import(@opentui/core-<platform>-<arch>)`, which only resolves
# when that platform's package is installed (i.e. on that OS). So we use a build
# matrix (native build + per-platform smoke test) and a final publish job that
# collects the four artifacts.
#
# Trigger by pushing a tag `vX.Y.Z` (which must match package.json "version"), or
# run manually via "Run workflow". Requires repo secret NPM_TOKEN (an npm automation
# token with publish rights to `quantcept` and the `quantcept-*` platform packages).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Quality gates + tag/version check, once, before we build or publish anything.
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG) does not match package.json version ($PKG)."
            exit 1
          fi
          echo "Releasing version $PKG"
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun test

  # Build (and smoke-test) each platform on its own native runner, where the
  # @opentui/core native package for that platform is installed. Produces
  # dist/quantcept-<os>-<arch>/{package.json, bin/quantcept[.exe]} and uploads it.
  build:
    needs: gates
    strategy:
      fail-fast: true
      matrix:
        include:
          - { runner: macos-14, target: darwin-arm64 } # Apple Silicon
          - { runner: macos-13, target: darwin-x64 } # Intel mac
          - { runner: ubuntu-latest, target: linux-x64 }
          - { runner: windows-latest, target: windows-x64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # --single builds only the current platform AND runs the smoke + tree-sitter
      # checks for it, so every published binary is validated on its real OS.
      - name: Build platform binary
        run: bun run script/build.ts --single
      - name: Upload platform package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/quantcept-*
          if-no-files-found: error

  # Collect the four platform packages and publish: platform packages first (so the
  # root's optionalDependencies resolve), then the root launcher.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Download platform packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Show collected packages
        run: ls -la dist && ls -la dist/quantcept-* || true
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for dir in dist/quantcept-*/; do
            name="$(node -p "require('./${dir}package.json').name")"
            ver="$(node -p "require('./${dir}package.json').version")"
            echo "Publishing ${name}@${ver}"
            npm publish "$dir" --access public
          done
      - name: Publish root launcher package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          for dir in dist/quantcept-*/; do
            name="$(node -p "require('./${dir}package.json').name")"
            npm pkg set "optionalDependencies.${name}=${VERSION}"
          done
          npm publish --access public
